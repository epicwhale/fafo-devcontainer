name: fafo_dev #  rename as you like

services:
  # Minimal container that owns the shared network namespace
  # Rarely changes, so it won't trigger cascade recreations
  net:
    image: alpine:latest
    command: sleep infinity

  devcontainer:
    image: mcr.microsoft.com/devcontainers/base:ubuntu
    network_mode: service:net
    volumes:
      # ../../ mounts two levels up to support sibling repos in a monorepo setup. Adjust as needed.
      # For repos opened directly, change to ..:/workspaces:cached
      - ../../:/workspaces:cached
    command: sleep infinity
